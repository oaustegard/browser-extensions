<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude Cache</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      min-height: 300px;
      max-height: 600px;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #7B1FA2, #9C27B0);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    
    .header-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .view-list, .view-detail {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    
    .view-list.active, .view-detail.active {
      display: flex;
      flex-direction: column;
    }
    
    /* Conversation List */
    .conv-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    
    .conv-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    
    .conv-item:hover {
      background: #f5f5f5;
    }
    
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    
    .conv-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    
    .conv-meta {
      font-size: 11px;
      color: #888;
    }
    
    .conv-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    
    .conv-item:hover .conv-actions {
      opacity: 1;
    }
    
    .conv-action-btn {
      background: #f0f0f0;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    
    .conv-action-btn:hover {
      background: #e0e0e0;
    }
    
    .conv-action-btn.claude-btn {
      padding: 4px 6px;
      font-size: 14px;
    }
    
    .conv-action-btn.delete {
      color: #d32f2f;
    }
    
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    
    .empty-state p {
      margin: 0 0 12px;
    }
    
    /* Detail View */
    .detail-header {
      padding: 8px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
    }
    
    .detail-title {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .detail-actions {
      display: flex;
      gap: 4px;
    }
    
    .detail-btn {
      background: #f0f0f0;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    
    .detail-btn:hover {
      background: #e0e0e0;
    }
    
    .detail-btn.primary {
      background: #7B1FA2;
      color: white;
    }
    
    .detail-btn.primary:hover {
      background: #6A1B9A;
    }
    
    /* Pruner Controls */
    .pruner-controls {
      padding: 8px 12px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    
    .control-group {
      display: flex;
      gap: 4px;
    }
    
    .toggle-btn {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 11px;
    }
    
    .toggle-btn:hover {
      background: #f5f5f5;
    }
    
    .toggle-btn.human { background-color: #e3f2fd; }
    .toggle-btn.assistant { background-color: #e8f5e9; }
    .toggle-btn.tools { background-color: #f3e5f5; }
    .toggle-btn.thinking { background-color: #fff3e0; }
    
    .stats {
      margin-left: auto;
      font-size: 11px;
      color: #666;
    }
    
    /* Message Content */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .message, .tool-use, .thinking-block {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 4px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .message.human {
      background-color: #e3f2fd;
      border-color: #90caf9;
    }

    .message.assistant {
      background-color: #e8f5e9;
      border-color: #a5d6a7;
    }

    .tool-use {
      background-color: #f3e5f5;
      border-color: #ce93d8;
    }

    .thinking-block {
      background-color: #fff3e0;
      border-color: #ffcc80;
    }

    .message.selected, .tool-use.selected, .thinking-block.selected {
      border-color: #4CAF50 !important;
    }

    .message:not(.selected), .tool-use:not(.selected), .thinking-block:not(.selected) {
      border-color: #ff4444;
      background: #fff0f0;
      opacity: 0.7;
    }

    .msg-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
      cursor: pointer;
    }

    .msg-header strong {
      text-transform: capitalize;
    }

    .msg-header .timestamp {
      color: #888;
    }

    .toggle-collapse {
      font-size: 0.8em;
      user-select: none;
      margin-left: 4px;
      color: #888;
    }

    .msg-content {
      max-height: 120px;
      overflow-y: auto;
      word-break: break-word;
    }

    .message.human .msg-content {
      white-space: pre-wrap;
    }

    /* Markdown in popup */
    .msg-content p { margin: 0.3em 0; }
    .msg-content code {
      font-family: ui-monospace, monospace;
      font-size: 0.9em;
      background: rgba(0,0,0,0.06);
      padding: 1px 3px;
      border-radius: 2px;
    }
    .msg-content pre code { background: none; padding: 0; }

    /* Tool display in popup */
    .tool-msg {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
    }

    .tool-section {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed #ce93d8;
    }

    .tool-section:first-of-type {
      border-top: none;
      margin-top: 2px;
      padding-top: 0;
    }

    .tool-label {
      font-weight: 600;
      font-size: 10px;
      color: #7B1FA2;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .tool-params, .tool-result {
      max-height: 80px;
      overflow-y: auto;
    }

    .tool-result-error {
      border-left: 2px solid #dc2626;
    }

    /* Thinking in popup */
    .thinking-summary {
      font-style: italic;
      color: #666;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .thinking-content {
      max-height: 80px;
      overflow-y: auto;
    }

    /* Collapsed state */
    .collapsed .tool-section,
    .collapsed .tool-msg,
    .collapsed .thinking-summary,
    .collapsed .thinking-content,
    .collapsed .msg-content {
      display: none;
    }

    .collapsed {
      max-height: 2.5em;
      overflow: hidden;
    }

    pre {
      margin: 4px 0;
      padding: 8px;
      background: #2b2b2b;
      color: #e6e1dc;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    code {
      font-family: ui-monospace, monospace;
    }
    
    /* Stream recovery notice */
    .stream-notice {
      padding: 12px 16px;
      background: #fff3e0;
      border-bottom: 1px solid #ffcc80;
      font-size: 12px;
    }

    .stream-notice strong {
      color: #e65100;
    }

    /* Inline confirmation bar */
    .confirm-bar {
      display: none;
      padding: 10px 16px;
      background: #fff3e0;
      border-bottom: 1px solid #ffcc80;
      font-size: 12px;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }

    .confirm-bar.active {
      display: flex;
    }

    .confirm-bar .confirm-btns {
      display: flex;
      gap: 6px;
    }

    .confirm-bar .confirm-btns button {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .confirm-bar .confirm-yes {
      background: #d32f2f;
      color: white;
    }

    .confirm-bar .confirm-yes:hover {
      background: #b71c1c;
    }

    .confirm-bar .confirm-no {
      background: #e0e0e0;
    }

    .confirm-bar .confirm-no:hover {
      background: #bdbdbd;
    }

    /* Status toast */
    .status-toast {
      display: none;
      padding: 8px 16px;
      font-size: 12px;
      text-align: center;
      flex-shrink: 0;
    }

    .status-toast.active {
      display: block;
    }

    .status-toast.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-toast.error {
      background: #ffebee;
      color: #c62828;
    }

    .stream-status-bar {
      display: none;
      padding: 8px 16px;
      background: #E8F5E9;
      border-bottom: 1px solid #C8E6C9;
      font-size: 12px;
      color: #2E7D32;
      flex-shrink: 0;
    }
    .stream-status-bar.active {
      display: block;
    }
    .stream-status-bar.error {
      background: #FFF3E0;
      border-color: #FFE0B2;
      color: #E65100;
    }
    .stream-status-bar .stream-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4CAF50;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    .stream-status-bar.error .stream-indicator {
      background: #FF9800;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Cache</h1>
    <div class="header-actions">
      <button class="header-btn" id="capture-btn" title="Capture current conversation">Capture</button>
      <button class="header-btn" id="refresh-btn" title="Refresh list">↻</button>
      <button class="header-btn" id="clear-btn" title="Clear all cached data">Clear</button>
    </div>
  </div>
  
  <div class="status-toast" id="status-toast"></div>
  <div class="confirm-bar" id="confirm-bar">
    <span id="confirm-message">Clear all cached conversations?</span>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirm-yes">Clear</button>
      <button class="confirm-no" id="confirm-no">Cancel</button>
    </div>
  </div>
  <div class="stream-status-bar" id="stream-status-bar">
    <span class="stream-indicator"></span>
    <span id="stream-status-text"></span>
  </div>
  <div class="view-list active" id="list-view">
    <ul class="conv-list" id="conv-list">
      <!-- Populated by JS -->
    </ul>
    <div class="empty-state" id="empty-state" style="display: none;">
      <p>No cached conversations yet.</p>
      <p>Browse claude.ai to start caching.</p>
    </div>
  </div>
  
  <div class="view-detail" id="detail-view">
    <div class="detail-header">
      <button class="back-btn" id="back-btn">←</button>
      <span class="detail-title" id="detail-title">Conversation</span>
      <div class="detail-actions">
        <button class="detail-btn" id="open-claude-btn" title="Open in Claude">↗ Claude</button>
        <button class="detail-btn" id="open-tab-btn" title="Open full viewer in new tab">⤢ Tab</button>
        <button class="detail-btn" id="copy-btn">Copy</button>
        <button class="detail-btn primary" id="render-btn">Render</button>
      </div>
    </div>
    
    <div class="stream-notice" id="stream-notice" style="display: none;">
      <strong>⚠️ Partial recovery:</strong> This conversation includes streamed content that may not have fully rendered in Claude's UI.
    </div>
    
    <div class="pruner-controls">
      <div class="control-group">
        <button class="toggle-btn" id="toggle-all">All</button>
        <button class="toggle-btn human" id="toggle-human">Human</button>
        <button class="toggle-btn assistant" id="toggle-assistant">Assistant</button>
        <button class="toggle-btn tools" id="toggle-tools">Tools</button>
        <button class="toggle-btn thinking" id="toggle-thinking">Thinking</button>
      </div>
      <span class="stats" id="stats">0/0 selected</span>
    </div>
    
    <div class="messages-container" id="messages-container">
      <!-- Populated by JS -->
    </div>
  </div>
  
  <script src="lib/pruner-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
