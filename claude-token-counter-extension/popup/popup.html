<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 540px;
      min-height: 200px;
      max-height: 600px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .icon { font-size: 18px; }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
    }

    .summary-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 18px;
      font-weight: 700;
    }

    .summary-value.cost { color: #86efac; }
    .summary-value.tokens { color: #93c5fd; }
    .summary-value.turns { color: #fbbf24; }

    .summary-sub {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      margin-bottom: 12px;
    }

    th {
      text-align: left;
      padding: 6px 8px;
      color: #94a3b8;
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      background: #0f172a;
    }

    td {
      padding: 5px 8px;
      color: #cbd5e1;
      border-bottom: 1px solid #1e293b;
    }

    tbody tr:hover td {
      background: #1e293b;
    }

    tfoot td {
      padding: 6px 8px;
      border-top: 1px solid #334155;
      font-weight: 600;
      color: #86efac;
    }

    .meta {
      font-size: 10px;
      color: #475569;
      border-top: 1px solid #1e293b;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta em { color: #64748b; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .empty-state .big { font-size: 28px; margin-bottom: 8px; }

    .refresh-btn {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
    }

    .refresh-btn:hover { background: #475569; }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h1><span class="icon">🔢</span> Claude Token Counter</h1>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>
  <div id="content">
    <div class="empty-state">
      <div class="big">💬</div>
      <div>Open a Claude.ai conversation to see token estimates</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
